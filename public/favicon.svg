<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Subee logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>

  <!-- Wings -->
  <ellipse cx="185" cy="208" rx="75" ry="44" fill="white" opacity="0.80" transform="rotate(-20, 185, 208)"/>
  <ellipse cx="327" cy="208" rx="75" ry="44" fill="white" opacity="0.80" transform="rotate(20, 327, 208)"/>

  <!-- Body -->
  <ellipse cx="256" cy="312" rx="80" ry="108" fill="#fbbf24"/>

  <!-- Stripes -->
  <rect x="180" y="280" width="152" height="28" rx="8" fill="#1a1a1a" opacity="0.70"/>
  <rect x="180" y="328" width="152" height="28" rx="8" fill="#1a1a1a" opacity="0.70"/>

  <!-- Stinger -->
  <polygon points="256,422 242,412 270,412" fill="#d97706"/>

  <!-- Head -->
  <circle cx="256" cy="196" r="56" fill="#fbbf24"/>

  <!-- Antennae -->
  <path d="M232,142 Q212,96 196,72" stroke="#fbbf24" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="191" cy="65" r="12" fill="#fbbf24"/>
  <path d="M280,142 Q300,96 316,72" stroke="#fbbf24" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="321" cy="65" r="12" fill="#fbbf24"/>

  <!-- Eyes -->
  <circle cx="236" cy="192" r="12" fill="#1a1a1a"/>
  <circle cx="276" cy="192" r="12" fill="#1a1a1a"/>

  <!-- Smile -->
  <path d="M236,222 Q256,242 276,222" stroke="#1a1a1a" stroke-width="7" fill="none" stroke-linecap="round"/>
</svg>
